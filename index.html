<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>土星环 · 粒子幻境</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js"></script>

    <style>
        :root {
            --bg: #020208;
            --gold: #e8a840;
            --blue: #6ab8e0;
            --panel-bg: rgba(8, 8, 20, 0.75);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            height: 100dvh;
            width: 100vw;
            position: fixed;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #video-element {
            display: none;
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .btn {
            transition: all 0.35s;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            -webkit-user-select: none;
            user-select: none;
        }
        .btn:active { transform: scale(0.94); }
        .btn-shape {
            padding: 12px 18px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            min-width: 60px;
            text-align: center;
        }
        .btn-shape.active {
            background: linear-gradient(135deg, rgba(232, 168, 64, 0.45), rgba(106, 184, 224, 0.2));
            border: 1px solid rgba(232, 168, 64, 0.6);
            box-shadow: 0 0 28px rgba(232, 168, 64, 0.25);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            color: #ffe0a0;
        }
        #loader-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #020208;
            transition: opacity 0.7s ease;
            pointer-events: all;
        }
        #loader-overlay.hidden { opacity: 0; pointer-events: none; }
        .loader-ring {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid rgba(232, 168, 64, 0.15);
            border-top-color: #e8a840;
            border-right-color: #6ab8e0;
            animation: spin 1s infinite;
            box-shadow: 0 0 40px rgba(232, 168, 64, 0.3);
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loader-text {
            margin-top: 18px;
            font-size: 13px;
            letter-spacing: 3px;
            color: #e8a840;
            font-weight: 300;
        }
        #status-bar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 30px;
            padding: 8px 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #ff4444;
            box-shadow: 0 0 14px #ff4444;
            transition: all 0.5s;
        }
        #status-dot.on {
            background: #4df0c0;
            box-shadow: 0 0 20px #4df0c0;
        }
        #status-text {
            font-size: 10px;
            letter-spacing: 1.5px;
            color: #aaa;
            font-weight: 500;
        }
        #bottom-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 12px;
            max-width: 95vw;
        }
        #audio-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 25;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #fff;
            font-size: 20px;
            transition: all 0.3s;
        }
        #audio-btn:active { transform: scale(0.9); }
        #audio-btn.muted { opacity: 0.5; }
        @media (max-width: 600px) {
            .btn-shape { padding: 10px 13px; font-size: 11px; border-radius: 12px; }
            #bottom-bar { gap: 5px; bottom: 14px; }
            #status-bar { top: 10px; padding: 6px 14px; gap: 6px; }
            #audio-btn { top: 12px; right: 12px; width: 38px; height: 38px; font-size: 17px; }
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<video id="video-element" playsinline muted autoplay></video>

<div id="loader-overlay">
    <div class="loader-ring"></div>
    <div class="loader-text">土星环 · 加载中</div>
</div>

<div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">等待手势</span>
</div>

<div id="audio-btn" title="音乐开关">🔊</div>

<div id="bottom-bar">
    <button class="btn btn-shape active" data-shape="saturn">🪐 土星环</button>
    <button class="btn btn-shape" data-shape="sphere">🌐 星云球</button>
    <button class="btn btn-shape" data-shape="heart">❤️ 机械心</button>
    <button class="btn btn-shape" data-shape="lotus">🪷 能量莲</button>
    <button class="btn btn-shape" data-shape="galaxy">🌀 黑洞</button>
</div>

<script>
(function() {
    // Three.js 变量
    var scene, camera, renderer, composer, particles, controls;
    var targetPositions = [];
    var targetColors = [];
    var currentShape = 'saturn';
    var handInfluence = 0;
    var isHandDetected = false;
    var clock = new THREE.Clock();
    var userBaseColor = new THREE.Color(0xffffff);

    var previousFingerPos = { x: 0, y: 0 };
    var smoothedFingerPos = { x: 0, y: 0 };
    var rotationVelocity = { x: 0, y: 0, z: 0 };
    var isTrackingRotation = false;

    var isTrackingRoll = false;
    var smoothedIndexTip = { x: 0, y: 0 };
    var smoothedMiddleTip = { x: 0, y: 0 };
    var previousRollAngle = 0;

    var currentStableMode = 'scale';
    var modeFrameCounter = 0;
    var lastTimeHandDetected = 0;

    var PARTICLE_COUNT = 28000;
    var PARTICLE_SIZE = 0.16;
    var SATURN_BODY_RATIO = 0.3;

    // 音频
    var bgmAudio = null;
    var isAudioMuted = false;
    var audioStarted = false;

    function initAudio() {
        if (bgmAudio) return;
        bgmAudio = new Audio();
        bgmAudio.src = './bgm.mp3';
        bgmAudio.loop = true;
        bgmAudio.volume = 0.25;
        bgmAudio.play().then(function() {
            audioStarted = true;
            document.getElementById('audio-btn').textContent = '🔊';
            document.getElementById('audio-btn').classList.remove('muted');
        }).catch(function(e) {
            console.log('等待用户交互');
        });
    }

    function toggleAudio() {
        if (!bgmAudio) { initAudio(); return; }
        isAudioMuted = !isAudioMuted;
        bgmAudio.muted = isAudioMuted;
        var btn = document.getElementById('audio-btn');
        btn.textContent = isAudioMuted ? '🔇' : '🔊';
        if (isAudioMuted) btn.classList.add('muted');
        else btn.classList.remove('muted');
    }

    function tryStartAudio() {
        if (!audioStarted && bgmAudio) {
            bgmAudio.play().then(function() {
                audioStarted = true;
                isAudioMuted = false;
                bgmAudio.muted = false;
                document.getElementById('audio-btn').textContent = '🔊';
                document.getElementById('audio-btn').classList.remove('muted');
            }).catch(function() {});
        } else if (!bgmAudio) {
            initAudio();
        }
    }

    function createParticleTexture() {
        var canvas = document.createElement('canvas');
        canvas.width = 32; canvas.height = 32;
        var ctx = canvas.getContext('2d');
        var gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(0.35, 'rgba(255,255,255,0.55)');
        gradient.addColorStop(0.7, 'rgba(255,220,180,0.15)');
        gradient.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 32, 32);
        return new THREE.CanvasTexture(canvas);
    }

    function getShapeColors(type) {
        var cols = new Float32Array(PARTICLE_COUNT * 3);
        for (var i = 0; i < PARTICLE_COUNT; i++) {
            var brightness = 0.25 + Math.random() * 0.75;
            var r, g, b;
            if (type === 'saturn') {
                if (i < PARTICLE_COUNT * SATURN_BODY_RATIO) {
                    r = 1.0; g = 0.68; b = 0.28;
                } else {
                    r = 0.55; g = 0.78; b = 1.0;
                }
                r *= brightness; g *= brightness; b *= brightness;
            } else if (type === 'sphere') {
                r = 0.3 + Math.random() * 0.4;
                g = 0.5 + Math.random() * 0.4;
                b = 0.8 + Math.random() * 0.2;
                r *= brightness; g *= brightness; b *= brightness;
            } else if (type === 'heart') {
                r = 0.8 + Math.random() * 0.2;
                g = 0.2 + Math.random() * 0.3;
                b = 0.4 + Math.random() * 0.4;
                r *= brightness; g *= brightness; b *= brightness;
            } else if (type === 'galaxy') {
                var darkBrightness = 0.08 + Math.random() * 0.25;
                r = 0.1 + Math.random() * 0.3;
                g = 0.05 + Math.random() * 0.2;
                b = 0.2 + Math.random() * 0.4;
                r *= darkBrightness; g *= darkBrightness; b *= darkBrightness;
            } else {
                r = brightness; g = brightness; b = brightness;
            }
            cols[i * 3] = r;
            cols[i * 3 + 1] = g;
            cols[i * 3 + 2] = b;
        }
        return cols;
    }

    function getShapePositions(type) {
        var pos = new Float32Array(PARTICLE_COUNT * 3);
        for (var i = 0; i < PARTICLE_COUNT; i++) {
            var x, y, z;
            if (type === 'sphere') {
                var r = 9 + Math.random() * 3;
                var theta = Math.random() * Math.PI * 2;
                var phi = Math.acos(2 * Math.random() - 1);
                x = r * Math.sin(phi) * Math.cos(theta);
                y = r * Math.sin(phi) * Math.sin(theta);
                z = r * Math.cos(phi);
                if (i < PARTICLE_COUNT * 0.2) { x *= 0.3; y *= 0.3; z *= 0.3; }
            } else if (type === 'heart') {
                var t = Math.PI - 2 * Math.PI * Math.random();
                var u = 2 * Math.PI * Math.random();
                x = 16 * Math.pow(Math.sin(t), 3);
                y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                z = 6 * Math.cos(t) * Math.sin(u) * Math.sin(t);
                var s = 0.6; x *= s; y *= s; z *= s;
                if (Math.random() > 0.8) { x *= 1.1; y *= 1.1; z *= 1.1; }
            } else if (type === 'saturn') {
                if (i < PARTICLE_COUNT * SATURN_BODY_RATIO) {
                    var r2 = 5.2;
                    var theta2 = Math.random() * Math.PI * 2;
                    var phi2 = Math.acos(2 * Math.random() - 1);
                    x = r2 * Math.sin(phi2) * Math.cos(theta2);
                    y = r2 * Math.sin(phi2) * Math.sin(theta2);
                    z = r2 * Math.cos(phi2);
                } else {
                    var angle = Math.random() * Math.PI * 2;
                    var ringSelector = Math.random();
                    var rr, thickness;
                    if (ringSelector < 0.42) {
                        rr = 6.5 + Math.random() * 3.8; thickness = 0.18;
                    } else if (ringSelector < 0.48) {
                        rr = 10.2 + Math.random() * 1.6; thickness = 0.08;
                        if (Math.random() > 0.25) { pos[i*3]=0; pos[i*3+1]=0; pos[i*3+2]=0; continue; }
                    } else {
                        rr = 12 + Math.random() * 5.5; thickness = 0.35;
                    }
                    x = rr * Math.cos(angle);
                    z = rr * Math.sin(angle);
                    y = (Math.random() - 0.5) * thickness;
                }
            } else if (type === 'lotus') {
                var u2 = Math.random() * Math.PI * 2;
                var v = Math.random();
                var petals = 7;
                var rBase = 8 * (0.5 + 0.5 * Math.pow(Math.sin(petals * u2 * 0.5), 2)) * v;
                x = rBase * Math.cos(u2);
                z = rBase * Math.sin(u2);
                y = 4 * Math.pow(v, 2) - 2;
                if (i < PARTICLE_COUNT * 0.15) { x = (Math.random()-0.5)*10; z = (Math.random()-0.5)*10; y = (Math.random()-0.5)*10; }
            } else if (type === 'galaxy') {
                var arms = 3;
                var spin = i % arms;
                var angleOffset = (spin / arms) * Math.PI * 2;
                var dist = Math.pow(Math.random(), 0.5);
                var rg = dist * 20;
                var angle2 = dist * 10 + angleOffset;
                x = rg * Math.cos(angle2);
                z = rg * Math.sin(angle2);
                y = (Math.random() - 0.5) * (15 - rg) * 0.2;
                if (rg < 2) y *= 0.2;
            }
            pos[i * 3] = x || 0;
            pos[i * 3 + 1] = y || 0;
            pos[i * 3 + 2] = z || 0;
        }
        return pos;
    }

    function createParticles() {
        var geometry = new THREE.BufferGeometry();
        var positions = new Float32Array(PARTICLE_COUNT * 3);
        var colors = new Float32Array(PARTICLE_COUNT * 3);
        var saturnPositions = getShapePositions('saturn');
        var saturnColors = getShapeColors('saturn');
        for (var i = 0; i < PARTICLE_COUNT; i++) {
            positions[i*3] = saturnPositions[i*3];
            positions[i*3+1] = saturnPositions[i*3+1];
            positions[i*3+2] = saturnPositions[i*3+2];
            colors[i*3] = saturnColors[i*3];
            colors[i*3+1] = saturnColors[i*3+1];
            colors[i*3+2] = saturnColors[i*3+2];
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        var sprite = createParticleTexture();
        var material = new THREE.PointsMaterial({
            size: PARTICLE_SIZE, map: sprite, color: new THREE.Color(0xffffff),
            transparent: true, opacity: 0.85, blending: THREE.AdditiveBlending,
            depthWrite: false, sizeAttenuation: true, vertexColors: true,
        });
        particles = new THREE.Points(geometry, material);
        scene.add(particles);
        targetPositions = new Float32Array(saturnPositions);
        targetColors = new Float32Array(saturnColors);
    }

    function animate() {
        requestAnimationFrame(animate);
        var time = clock.getElapsedTime();
        var positions = particles.geometry.attributes.position.array;
        var colors = particles.geometry.attributes.color.array;

        var targetScaleBase = 1.0;
        var targetParticleSize = PARTICLE_SIZE;
        var turbulence = 0.04;

        if (isHandDetected) {
            targetScaleBase = 0.18 + (handInfluence * 2.5);
            turbulence = 0.02 + (handInfluence * 0.35);
            targetParticleSize = PARTICLE_SIZE * (0.75 + handInfluence * 2.8);
        } else {
            targetScaleBase = 1.0 + Math.sin(time * 1.3) * 0.04;
            targetParticleSize = PARTICLE_SIZE * (1.0 + Math.sin(time * 1.3) * 0.12);
        }

        if (particles && particles.material) {
            particles.material.size = THREE.MathUtils.lerp(particles.material.size, targetParticleSize, 0.12);
            var camRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion).normalize();
            var camUp = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion).normalize();
            var camForward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
            particles.rotateOnWorldAxis(camUp, rotationVelocity.y);
            particles.rotateOnWorldAxis(camRight, rotationVelocity.x);
            particles.rotateOnWorldAxis(camForward, rotationVelocity.z);
            var MAX_SPEED = 0.07, MAX_ROLL_SPEED = 0.04;
            rotationVelocity.x = THREE.MathUtils.clamp(rotationVelocity.x, -MAX_SPEED, MAX_SPEED);
            rotationVelocity.y = THREE.MathUtils.clamp(rotationVelocity.y, -MAX_SPEED, MAX_SPEED);
            rotationVelocity.z = THREE.MathUtils.clamp(rotationVelocity.z, -MAX_ROLL_SPEED, MAX_ROLL_SPEED);
            rotationVelocity.x *= 0.91; rotationVelocity.y *= 0.91; rotationVelocity.z *= 0.95;
        }

        var lerpSpeed = 0.065;
        var colorLerpSpeed = 0.035;
        var saturnAutoRotate = (!isHandDetected && currentShape === 'saturn') ? time * 0.25 : 0;

        for (var i = 0; i < PARTICLE_COUNT; i++) {
            var idx = i * 3;
            var tx = targetPositions[idx];
            var ty = targetPositions[idx + 1];
            var tz = targetPositions[idx + 2];

            if (saturnAutoRotate !== 0) {
                var cosR = Math.cos(saturnAutoRotate);
                var sinR = Math.sin(saturnAutoRotate);
                var rx = tx * cosR - tz * sinR;
                var rz = tx * sinR + tz * cosR;
                tx = rx; tz = rz;
            }

            var dist = Math.sqrt(tx*tx + ty*ty + tz*tz);
            var normalizedDist = Math.min(dist / 20.0, 1.0);
            var distanceExpansionBoost = 1.0;
            if (isHandDetected) {
                distanceExpansionBoost = 1.0 + (handInfluence * Math.pow(normalizedDist, 1.4) * 2.2);
            }
            var finalScale = targetScaleBase * distanceExpansionBoost;
            tx *= finalScale; ty *= finalScale; tz *= finalScale;

            if (currentShape === 'galaxy') {
                var angleG = time * (0.1 + (1.0 - (Math.sqrt(tx*tx+tz*tz)/20)) * 0.5);
                var cosG = Math.cos(angleG), sinG = Math.sin(angleG);
                var rxx = tx * cosG - tz * sinG;
                var rzz = tx * sinG + tz * cosG;
                tx = rxx; tz = rzz;
            } else if (currentShape === 'lotus') {
                ty += Math.sin(time + tx) * 0.5;
            } else if (currentShape === 'saturn') {
                tx += Math.sin(time * 2.5 + i * 0.3) * turbulence * 0.7;
                ty += Math.cos(time * 3 + i * 0.2) * turbulence * 0.6;
                tz += Math.sin(time * 3.5 + i * 0.25) * turbulence * 0.7;
            } else {
                tx += Math.sin(time * 2 + i) * turbulence;
                ty += Math.cos(time * 3 + i) * turbulence;
                tz += Math.sin(time * 4 + i) * turbulence;
            }

            positions[idx] += (tx - positions[idx]) * lerpSpeed;
            positions[idx+1] += (ty - positions[idx+1]) * lerpSpeed;
            positions[idx+2] += (tz - positions[idx+2]) * lerpSpeed;

            if (targetColors.length > 0) {
                colors[idx] += (targetColors[idx] - colors[idx]) * colorLerpSpeed;
                colors[idx+1] += (targetColors[idx+1] - colors[idx+1]) * colorLerpSpeed;
                colors[idx+2] += (targetColors[idx+2] - colors[idx+2]) * colorLerpSpeed;
            }
            if (Math.random() > 0.9996) {
                colors[idx] = 2.2; colors[idx+1] = 2.2; colors[idx+2] = 2.2;
            }
            if (colors[idx] > 1.6) {
                colors[idx] *= 0.88; colors[idx+1] *= 0.88; colors[idx+2] *= 0.88;
            }
        }

        particles.geometry.attributes.position.needsUpdate = true;
        particles.geometry.attributes.color.needsUpdate = true;

        if (!isHandDetected) { controls.autoRotate = true; controls.autoRotateSpeed = 0.7; }
        else { controls.autoRotate = false; }

        controls.update();
        composer.render();
    }

    function setupMediaPipe() {
        var videoElement = document.getElementById('video-element');
        var statusDot = document.getElementById('status-dot');
        var statusText = document.getElementById('status-text');
        var hands = new Hands({
            locateFile: function(file) {
                return 'https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/' + file;
            }
        });
        hands.setOptions({
            maxNumHands: 1, modelComplexity: 1,
            minDetectionConfidence: 0.35, minTrackingConfidence: 0.35,
        });
        hands.onResults(function(results) {
            var now = Date.now();
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                isHandDetected = true; lastTimeHandDetected = now;
                statusDot.classList.add('on');
                statusText.innerText = "手势已连接"; statusText.style.color = '#4df0c0';
                var landmarks = results.multiHandLandmarks[0];
                function getDist(i, j) {
                    return Math.sqrt(Math.pow(landmarks[i].x - landmarks[j].x, 2) + Math.pow(landmarks[i].y - landmarks[j].y, 2));
                }
                var isIndexOpen = getDist(8,0) > getDist(6,0)*1.05;
                var isMiddleOpen = getDist(12,0) > getDist(10,0)*1.05;
                var isRingOpen = getDist(16,0) > getDist(14,0)*1.05;
                var isPinkyOpen = getDist(20,0) > getDist(18,0)*1.05;
                var detectedMode = 'scale';
                if (isRingOpen || isPinkyOpen) detectedMode = 'scale';
                else if (isIndexOpen && isMiddleOpen) detectedMode = 'roll';
                else if (isIndexOpen && !isMiddleOpen) detectedMode = 'rotate';
                else detectedMode = 'scale';

                if (detectedMode === currentStableMode) modeFrameCounter = 0;
                else {
                    modeFrameCounter++;
                    if (modeFrameCounter > 2) {
                        currentStableMode = detectedMode; modeFrameCounter = 0;
                        isTrackingRotation = false; isTrackingRoll = false;
                    }
                }

                if (currentStableMode === 'roll') {
                    var rawIndex = landmarks[8], rawMiddle = landmarks[12];
                    if (!isTrackingRoll) {
                        smoothedIndexTip = { x: rawIndex.x, y: rawIndex.y };
                        smoothedMiddleTip = { x: rawMiddle.x, y: rawMiddle.y };
                        previousRollAngle = Math.atan2(rawIndex.y - rawMiddle.y, rawIndex.x - rawMiddle.x);
                        isTrackingRoll = true;
                    } else {
                        var f = 0.25;
                        smoothedIndexTip.x += (rawIndex.x - smoothedIndexTip.x) * f;
                        smoothedIndexTip.y += (rawIndex.y - smoothedIndexTip.y) * f;
                        smoothedMiddleTip.x += (rawMiddle.x - smoothedMiddleTip.x) * f;
                        smoothedMiddleTip.y += (rawMiddle.y - smoothedMiddleTip.y) * f;
                    }
                    var dx = smoothedIndexTip.x - smoothedMiddleTip.x;
                    var dy = smoothedIndexTip.y - smoothedMiddleTip.y;
                    var currentAngle = Math.atan2(dy, dx);
                    var deltaAngle = currentAngle - previousRollAngle;
                    if (deltaAngle > Math.PI) deltaAngle -= 2*Math.PI;
                    if (deltaAngle < -Math.PI) deltaAngle += 2*Math.PI;
                    rotationVelocity.z += (-deltaAngle*1.8 - rotationVelocity.z) * 0.35;
                    previousRollAngle = currentAngle;
                    isTrackingRotation = false;
                } else if (currentStableMode === 'rotate') {
                    var rawX = landmarks[8].x, rawY = landmarks[8].y;
                    if (!isTrackingRotation) {
                        smoothedFingerPos = { x: rawX, y: rawY };
                        previousFingerPos = { x: rawX, y: rawY };
                        isTrackingRotation = true;
                    }
                    var f2 = 0.28;
                    smoothedFingerPos.x += (rawX - smoothedFingerPos.x) * f2;
                    smoothedFingerPos.y += (rawY - smoothedFingerPos.y) * f2;
                    var deltaX = smoothedFingerPos.x - previousFingerPos.x;
                    var deltaY = smoothedFingerPos.y - previousFingerPos.y;
                    if (Math.abs(deltaX) > 0.003 || Math.abs(deltaY) > 0.003) {
                        var sens = 4.0;
                        if (Math.abs(deltaX) > Math.abs(deltaY)) {
                            rotationVelocity.y -= (deltaX > 0 ? deltaX - 0.003 : deltaX + 0.003) * sens;
                        } else {
                            rotationVelocity.x += (deltaY > 0 ? deltaY - 0.003 : deltaY + 0.003) * sens;
                        }
                    }
                    previousFingerPos = { x: smoothedFingerPos.x, y: smoothedFingerPos.y };
                    isTrackingRoll = false;
                } else {
                    if (isTrackingRoll) isTrackingRoll = false;
                    isTrackingRotation = false;
                    var tips = [4,8,12,16,20];
                    var totalDist = 0;
                    for (var k = 0; k < tips.length; k++) totalDist += getDist(tips[k], 0);
                    var avgDist = totalDist/5;
                    var rawOpenness = (avgDist - 0.07) / (0.38 - 0.07);
                    rawOpenness = Math.max(0, Math.min(1, rawOpenness));
                    handInfluence += (rawOpenness - handInfluence) * 0.25;
                }
            } else {
                if (now - lastTimeHandDetected < 600) return;
                isHandDetected = false; isTrackingRotation = false; isTrackingRoll = false;
                modeFrameCounter = 0; currentStableMode = 'scale';
                statusDot.classList.remove('on');
                statusText.innerText = "等待手势"; statusText.style.color = '#aaa';
                handInfluence += (0.5 - handInfluence) * 0.03;
            }
        });
        var cameraUtils = new Camera(videoElement, {
            onFrame: function() { hands.send({ image: videoElement }); },
            width: 640, height: 480,
        });
        cameraUtils.start().catch(function() {
            statusText.innerText = "摄像头不可用";
            isHandDetected = false;
        });
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    }

    window.changeShape = function(shape) {
        tryStartAudio();
        currentShape = shape;
        targetPositions = getShapePositions(shape);
        targetColors = getShapeColors(shape);
        if (shape === 'saturn') particles.material.color.set(0xffffff);
        else particles.material.color.copy(userBaseColor);
        var btns = document.querySelectorAll('[data-shape]');
        for (var i = 0; i < btns.length; i++) {
            btns[i].classList.remove('active');
            if (btns[i].dataset.shape === shape) btns[i].classList.add('active');
        }
    };

    // 初始化
    scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x020208, 0.015);
    camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.z = 28; camera.position.y = 2;

    renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0));
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.getElementById('canvas-container').appendChild(renderer.domElement);

    var renderScene = new THREE.RenderPass(scene, camera);
    var bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.4, 0.35, 0.85);
    bloomPass.threshold = 0.04; bloomPass.strength = 1.3; bloomPass.radius = 0.55;
    composer = new THREE.EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.6;
    controls.enableZoom = true;
    controls.minDistance = 8;
    controls.maxDistance = 60;

    createParticles();
    setupMediaPipe();

    window.addEventListener('resize', onWindowResize);
    animate();

    setTimeout(function() {
        var loader = document.getElementById('loader-overlay');
        loader.classList.add('hidden');
        setTimeout(function() { loader.remove(); }, 800);
    }, 2200);

    document.getElementById('audio-btn').addEventListener('click', function(e) {
        e.stopPropagation(); tryStartAudio(); toggleAudio();
    });
    document.getElementById('audio-btn').addEventListener('touchend', function(e) {
        e.stopPropagation(); e.preventDefault(); tryStartAudio(); toggleAudio();
    });
    document.addEventListener('touchstart', tryStartAudio, { once: true });
    document.addEventListener('click', tryStartAudio, { once: true });

    var btns = document.querySelectorAll('[data-shape]');
    for (var b = 0; b < btns.length; b++) {
        btns[b].addEventListener('click', function() {
            tryStartAudio();
            window.changeShape(this.dataset.shape);
        });
        btns[b].addEventListener('touchend', function(e) {
            e.preventDefault();
            tryStartAudio();
            window.changeShape(this.dataset.shape);
        });
    }

    console.log('🪐 土星环粒子幻境 — 已就绪 (小米/QQ浏览器兼容版)');
})();
</script>
