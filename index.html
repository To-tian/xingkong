<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>土星环 · 粒子幻境</title>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.154.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.154.0/examples/jsm/"
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous">
    </script>

    <style>
        :root {
            --bg: #020208;
            --gold: #e8a840;
            --blue: #6ab8e0;
            --panel-bg: rgba(8, 8, 20, 0.75);
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg);
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            height: 100dvh;
            width: 100vw;
            position: fixed;
        }
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        #video-element {
            display: none;
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }
        .glass-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
        }
        .btn {
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            outline: none;
            -webkit-user-select: none;
            user-select: none;
        }
        .btn:active {
            transform: scale(0.94);
            transition: transform 0.1s;
        }
        .btn-shape {
            padding: 12px 18px;
            border-radius: 14px;
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            letter-spacing: 0.5px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            min-width: 60px;
            text-align: center;
        }
        .btn-shape.active {
            background: linear-gradient(135deg, rgba(232, 168, 64, 0.45), rgba(106, 184, 224, 0.2));
            border: 1px solid rgba(232, 168, 64, 0.6);
            box-shadow: 0 0 28px rgba(232, 168, 64, 0.25);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            color: #ffe0a0;
        }
        #loader-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #020208;
            transition: opacity 0.7s ease;
            pointer-events: all;
        }
        #loader-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loader-ring {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid rgba(232, 168, 64, 0.15);
            border-top-color: #e8a840;
            border-right-color: #6ab8e0;
            animation: spin 1s cubic-bezier(0.5, 0.1, 0.5, 0.9) infinite;
            box-shadow: 0 0 40px rgba(232, 168, 64, 0.3), 0 0 80px rgba(106, 184, 224, 0.2);
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loader-text {
            margin-top: 18px;
            font-size: 13px;
            letter-spacing: 3px;
            color: #e8a840;
            text-transform: uppercase;
            font-weight: 300;
        }
        #status-bar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 30px;
            padding: 8px 18px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #ff4444;
            box-shadow: 0 0 14px #ff4444;
            transition: all 0.5s;
        }
        #status-dot.on {
            background: #4df0c0;
            box-shadow: 0 0 20px #4df0c0;
        }
        #status-text {
            font-size: 10px;
            letter-spacing: 1.5px;
            color: #aaa;
            font-weight: 500;
        }
        #bottom-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 0 12px;
            max-width: 95vw;
        }
        #audio-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 25;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #fff;
            font-size: 20px;
            transition: all 0.3s;
        }
        #audio-btn:active { transform: scale(0.9); }
        #audio-btn.muted {
            opacity: 0.5;
            border-color: rgba(255, 255, 255, 0.08);
        }
        @media (max-width: 600px) {
            .btn-shape {
                padding: 10px 13px;
                font-size: 11px;
                border-radius: 12px;
                letter-spacing: 0.3px;
            }
            #bottom-bar { gap: 5px; bottom: 14px; }
            #status-bar { top: 10px; padding: 6px 14px; gap: 6px; }
            #audio-btn { top: 12px; right: 12px; width: 38px; height: 38px; font-size: 17px; }
        }
    </style>
</head>
<body>

<div id="canvas-container"></div>
<video id="video-element" playsinline muted autoplay></video>

<div id="loader-overlay">
    <div class="loader-ring"></div>
    <div class="loader-text">土星环 · 加载中</div>
</div>

<div id="status-bar">
    <div id="status-dot"></div>
    <span id="status-text">等待手势</span>
</div>

<div id="audio-btn" title="音乐开关">🔊</div>

<div id="bottom-bar">
    <button class="btn btn-shape active" data-shape="saturn">🪐 土星环</button>
    <button class="btn btn-shape" data-shape="sphere">🌐 星云球</button>
    <button class="btn btn-shape" data-shape="heart">❤️ 机械心</button>
    <button class="btn btn-shape" data-shape="lotus">🪷 能量莲</button>
    <button class="btn btn-shape" data-shape="galaxy">🌀 黑洞</button>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    const PARTICLE_COUNT = 28000;
    const PARTICLE_SIZE = 0.16;
    const SATURN_BODY_RATIO = 0.3;

    let scene, camera, renderer, composer, particles, controls;
    let targetPositions = [];
    let targetColors = [];
    let currentShape = 'saturn';
    let handInfluence = 0;
    let isHandDetected = false;
    let clock = new THREE.Clock();
    let userBaseColor = new THREE.Color(0xffffff);

    let previousFingerPos = { x: 0, y: 0 };
    let smoothedFingerPos = { x: 0, y: 0 };
    let rotationVelocity = { x: 0, y: 0, z: 0 };
    let isTrackingRotation = false;

    let isTrackingRoll = false;
    let smoothedIndexTip = { x: 0, y: 0 };
    let smoothedMiddleTip = { x: 0, y: 0 };
    let previousRollAngle = 0;

    let currentStableMode = 'scale';
    let modeFrameCounter = 0;
    let lastTimeHandDetected = 0;

    // 音频
    let bgmAudio = null;
    let isAudioMuted = false;
    let audioStarted = false;

    function initAudio() {
        if (bgmAudio) return;
        bgmAudio = new Audio();
        bgmAudio.src = './bgm.mp3'; // 替换为你的音乐链接
        bgmAudio.loop = true;
        bgmAudio.volume = 0.25;
        bgmAudio.play().then(() => {
            audioStarted = true;
            document.getElementById('audio-btn').textContent = '🔊';
            document.getElementById('audio-btn').classList.remove('muted');
        }).catch(e => console.log('等待用户交互'));
    }

    function toggleAudio() {
        if (!bgmAudio) { initAudio(); return; }
        isAudioMuted = !isAudioMuted;
        bgmAudio.muted = isAudioMuted;
        const btn = document.getElementById('audio-btn');
        btn.textContent = isAudioMuted ? '🔇' : '🔊';
        if (isAudioMuted) btn.classList.add('muted');
        else btn.classList.remove('muted');
    }

    function tryStartAudio() {
        if (!audioStarted && bgmAudio) {
            bgmAudio.play().then(() => {
                audioStarted = true;
                isAudioMuted = false;
                bgmAudio.muted = false;
                document.getElementById('audio-btn').textContent = '🔊';
                document.getElementById('audio-btn').classList.remove('muted');
            }).catch(() => {});
        } else if (!bgmAudio) initAudio();
    }

    async function init() {
        scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020208, 0.015);
        camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 28; camera.position.y = 2;

        renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2.0));
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.4, 0.35, 0.85);
        bloomPass.threshold = 0.04; bloomPass.strength = 1.3; bloomPass.radius = 0.55;
        composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.6;
        controls.enableZoom = true;
        controls.minDistance = 8;
        controls.maxDistance = 60;

        createParticles();
        await setupMediaPipe();

        window.addEventListener('resize', onWindowResize);
        animate();

        setTimeout(() => {
            const loader = document.getElementById('loader-overlay');
            loader.classList.add('hidden');
            setTimeout(() => loader.remove(), 800);
        }, 2200);

        document.getElementById('audio-btn').addEventListener('click', (e) => {
            e.stopPropagation(); tryStartAudio(); toggleAudio();
        });
        document.getElementById('audio-btn').addEventListener('touchend', (e) => {
            e.stopPropagation(); e.preventDefault(); tryStartAudio(); toggleAudio();
        });
        document.addEventListener('touchstart', tryStartAudio, { once: true });
        document.addEventListener('click', tryStartAudio, { once: true });
    }

    function createParticles() {
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        const saturnPositions = getShapePositions('saturn');
        const saturnColors = getShapeColors('saturn');
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            positions[i*3] = saturnPositions[i*3];
            positions[i*3+1] = saturnPositions[i*3+1];
            positions[i*3+2] = saturnPositions[i*3+2];
            colors[i*3] = saturnColors[i*3];
            colors[i*3+1] = saturnColors[i*3+1];
            colors[i*3+2] = saturnColors[i*3+2];
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const sprite = createParticleTexture();
        const material = new THREE.PointsMaterial({
            size: PARTICLE_SIZE, map: sprite, color: new THREE.Color(0xffffff),
            transparent: true, opacity: 0.85, blending: THREE.AdditiveBlending,
            depthWrite: false, sizeAttenuation: true, vertexColors: true,
        });
        particles = new THREE.Points(geometry, material);
        scene.add(particles);
        targetPositions = Float32Array.from(saturnPositions);
        targetColors = Float32Array.from(saturnColors);
    }

    function createParticleTexture() {
        const canvas = document.createElement('canvas');
        canvas.width = 32; canvas.height = 32;
        const ctx = canvas.getContext('2d');
        const gradient = ctx.createRadialGradient(16, 16, 0, 16, 16, 16);
        gradient.addColorStop(0, 'rgba(255,255,255,1)');
        gradient.addColorStop(0.35, 'rgba(255,255,255,0.55)');
        gradient.addColorStop(0.7, 'rgba(255,220,180,0.15)');
        gradient.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, 32, 32);
        return new THREE.CanvasTexture(canvas);
    }

    function getShapeColors(type) {
        const cols = new Float32Array(PARTICLE_COUNT * 3);
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            let brightness = 0.25 + Math.random() * 0.75;
            let r, g, b;

            if (type === 'saturn') {
                if (i < PARTICLE_COUNT * SATURN_BODY_RATIO) {
                    r = 1.0; g = 0.68; b = 0.28;
                } else {
                    r = 0.55; g = 0.78; b = 1.0;
                }
                r *= brightness; g *= brightness; b *= brightness;
            } else if (type === 'sphere') {
                // 蓝色调星云球
                r = 0.3 + Math.random() * 0.4;
                g = 0.5 + Math.random() * 0.4;
                b = 0.8 + Math.random() * 0.2;
                r *= brightness; g *= brightness; b *= brightness;
            } else if (type === 'heart') {
                // 粉红色调机械心
                r = 0.8 + Math.random() * 0.2;
                g = 0.2 + Math.random() * 0.3;
                b = 0.4 + Math.random() * 0.4;
                r *= brightness; g *= brightness; b *= brightness;
            } else if (type === 'galaxy') {
                // 暗色调黑洞 (暗紫/暗蓝)
                const darkBrightness = 0.08 + Math.random() * 0.25;
                r = 0.1 + Math.random() * 0.3;
                g = 0.05 + Math.random() * 0.2;
                b = 0.2 + Math.random() * 0.4;
                r *= darkBrightness; g *= darkBrightness; b *= darkBrightness;
            } else {
                // 默认白色（能量莲等）
                r = brightness; g = brightness; b = brightness;
            }

            cols[i * 3] = r;
            cols[i * 3 + 1] = g;
            cols[i * 3 + 2] = b;
        }
        return cols;
    }

    function getShapePositions(type) {
        const pos = new Float32Array(PARTICLE_COUNT * 3);
        for (let i = 0; i < PARTICLE_COUNT; i++) {
            let x, y, z;
            if (type === 'sphere') {
                const r = 9 + Math.random() * 3;
                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos(2 * Math.random() - 1);
                x = r * Math.sin(phi) * Math.cos(theta);
                y = r * Math.sin(phi) * Math.sin(theta);
                z = r * Math.cos(phi);
                if (i < PARTICLE_COUNT * 0.2) { x *= 0.3; y *= 0.3; z *= 0.3; }
            } else if (type === 'heart') {
                const t = Math.PI - 2 * Math.PI * Math.random();
                const u = 2 * Math.PI * Math.random();
                x = 16 * Math.pow(Math.sin(t), 3);
                y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
                z = 6 * Math.cos(t) * Math.sin(u) * Math.sin(t);
                const s = 0.6; x *= s; y *= s; z *= s;
                if (Math.random() > 0.8) { x *= 1.1; y *= 1.1; z *= 1.1; }
            } else if (type === 'saturn') {
                if (i < PARTICLE_COUNT * SATURN_BODY_RATIO) {
                    const r = 5.2;
                    const theta = Math.random() * Math.PI * 2;
                    const phi = Math.acos(2 * Math.random() - 1);
                    x = r * Math.sin(phi) * Math.cos(theta);
                    y = r * Math.sin(phi) * Math.sin(theta);
                    z = r * Math.cos(phi);
                } else {
                    const angle = Math.random() * Math.PI * 2;
                    const ringSelector = Math.random();
                    let r, thickness;
                    if (ringSelector < 0.42) {
                        r = 6.5 + Math.random() * 3.8; thickness = 0.18;
                    } else if (ringSelector < 0.48) {
                        r = 10.2 + Math.random() * 1.6; thickness = 0.08;
                        if (Math.random() > 0.25) { pos[i*3]=0; pos[i*3+1]=0; pos[i*3+2]=0; continue; }
                    } else {
                        r = 12 + Math.random() * 5.5; thickness = 0.35;
                    }
                    x = r * Math.cos(angle);
                    z = r * Math.sin(angle);
                    y = (Math.random() - 0.5) * thickness;
                }
            } else if (type === 'lotus') {
                const u = Math.random() * Math.PI * 2;
                const v = Math.random();
                const petals = 7;
                const rBase = 8 * (0.5 + 0.5 * Math.pow(Math.sin(petals * u * 0.5), 2)) * v;
                x = rBase * Math.cos(u);
                z = rBase * Math.sin(u);
                y = 4 * Math.pow(v, 2) - 2;
                if (i < PARTICLE_COUNT * 0.15) { x = (Math.random()-0.5); z = (Math.random()-0.5); y = (Math.random()-0.5)*10; }
            } else if (type === 'galaxy') {
                const arms = 3;
                const spin = i % arms;
                const angleOffset = (spin / arms) * Math.PI * 2;
                const dist = Math.pow(Math.random(), 0.5);
                const r = dist * 20;
                const angle = dist * 10 + angleOffset;
                x = r * Math.cos(angle);
                z = r * Math.sin(angle);
                y = (Math.random() - 0.5) * (15 - r) * 0.2;
                if (r < 2) y *= 0.2;
            }
            pos[i * 3] = x || 0;
            pos[i * 3 + 1] = y || 0;
            pos[i * 3 + 2] = z || 0;
        }
        return pos;
    }

    function animate() {
        requestAnimationFrame(animate);
        const time = clock.getElapsedTime();
        const positions = particles.geometry.attributes.position.array;
        const colors = particles.geometry.attributes.color.array;

        let targetScaleBase = 1.0;
        let targetParticleSize = PARTICLE_SIZE;
        let turbulence = 0.04;

        if (isHandDetected) {
            targetScaleBase = 0.18 + (handInfluence * 2.5);
            turbulence = 0.02 + (handInfluence * 0.35);
            targetParticleSize = PARTICLE_SIZE * (0.75 + handInfluence * 2.8);
        } else {
            targetScaleBase = 1.0 + Math.sin(time * 1.3) * 0.04;
            targetParticleSize = PARTICLE_SIZE * (1.0 + Math.sin(time * 1.3) * 0.12);
        }

        if (particles && particles.material) {
            particles.material.size = THREE.MathUtils.lerp(particles.material.size, targetParticleSize, 0.12);
            const camRight = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion).normalize();
            const camUp = new THREE.Vector3(0, 1, 0).applyQuaternion(camera.quaternion).normalize();
            const camForward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion).normalize();
            particles.rotateOnWorldAxis(camUp, rotationVelocity.y);
            particles.rotateOnWorldAxis(camRight, rotationVelocity.x);
            particles.rotateOnWorldAxis(camForward, rotationVelocity.z);
            const MAX_SPEED = 0.07, MAX_ROLL_SPEED = 0.04;
            rotationVelocity.x = THREE.MathUtils.clamp(rotationVelocity.x, -MAX_SPEED, MAX_SPEED);
            rotationVelocity.y = THREE.MathUtils.clamp(rotationVelocity.y, -MAX_SPEED, MAX_SPEED);
            rotationVelocity.z = THREE.MathUtils.clamp(rotationVelocity.z, -MAX_ROLL_SPEED, MAX_ROLL_SPEED);
            rotationVelocity.x *= 0.91; rotationVelocity.y *= 0.91; rotationVelocity.z *= 0.95;
        }

        const lerpSpeed = 0.065;
        const colorLerpSpeed = 0.035;
        const saturnAutoRotate = (!isHandDetected && currentShape === 'saturn') ? time * 0.25 : 0;

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            const idx = i * 3;
            let tx = targetPositions[idx];
            let ty = targetPositions[idx + 1];
            let tz = targetPositions[idx + 2];

            if (saturnAutoRotate !== 0) {
                const cosR = Math.cos(saturnAutoRotate);
                const sinR = Math.sin(saturnAutoRotate);
                const rx = tx * cosR - tz * sinR;
                const rz = tx * sinR + tz * cosR;
                tx = rx; tz = rz;
            }

            const dist = Math.sqrt(tx*tx + ty*ty + tz*tz);
            const normalizedDist = Math.min(dist / 20.0, 1.0);
            let distanceExpansionBoost = 1.0;
            if (isHandDetected) {
                distanceExpansionBoost = 1.0 + (handInfluence * Math.pow(normalizedDist, 1.4) * 2.2);
            }
            const finalScale = targetScaleBase * distanceExpansionBoost;
            tx *= finalScale; ty *= finalScale; tz *= finalScale;

            if (currentShape === 'galaxy') {
                const angle = time * (0.1 + (1.0 - (Math.sqrt(tx*tx+tz*tz)/20)) * 0.5);
                const cos = Math.cos(angle), sin = Math.sin(angle);
                const rx = tx * cos - tz * sin;
                const rz = tx * sin + tz * cos;
                tx = rx; tz = rz;
            } else if (currentShape === 'lotus') {
                ty += Math.sin(time + tx) * 0.5;
            } else if (currentShape === 'saturn') {
                tx += Math.sin(time * 2.5 + i * 0.3) * turbulence * 0.7;
                ty += Math.cos(time * 3 + i * 0.2) * turbulence * 0.6;
                tz += Math.sin(time * 3.5 + i * 0.25) * turbulence * 0.7;
            } else {
                tx += Math.sin(time * 2 + i) * turbulence;
                ty += Math.cos(time * 3 + i) * turbulence;
                tz += Math.sin(time * 4 + i) * turbulence;
            }

            positions[idx] += (tx - positions[idx]) * lerpSpeed;
            positions[idx+1] += (ty - positions[idx+1]) * lerpSpeed;
            positions[idx+2] += (tz - positions[idx+2]) * lerpSpeed;

            if (targetColors.length > 0) {
                colors[idx] += (targetColors[idx] - colors[idx]) * colorLerpSpeed;
                colors[idx+1] += (targetColors[idx+1] - colors[idx+1]) * colorLerpSpeed;
                colors[idx+2] += (targetColors[idx+2] - colors[idx+2]) * colorLerpSpeed;
            }
            if (Math.random() > 0.9996) {
                colors[idx] = 2.2; colors[idx+1] = 2.2; colors[idx+2] = 2.2;
            }
            if (colors[idx] > 1.6) {
                colors[idx] *= 0.88; colors[idx+1] *= 0.88; colors[idx+2] *= 0.88;
            }
        }

        particles.geometry.attributes.position.needsUpdate = true;
        particles.geometry.attributes.color.needsUpdate = true;

        if (!isHandDetected) { controls.autoRotate = true; controls.autoRotateSpeed = 0.7; }
        else { controls.autoRotate = false; }

        controls.update();
        composer.render();
    }

    async function setupMediaPipe() {
        const videoElement = document.getElementById('video-element');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });
        hands.setOptions({
            maxNumHands: 1, modelComplexity: 1,
            minDetectionConfidence: 0.35, minTrackingConfidence: 0.35,
        });
        hands.onResults((results) => {
            const now = Date.now();
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                isHandDetected = true; lastTimeHandDetected = now;
                statusDot.classList.add('on');
                statusText.innerText = "手势已连接"; statusText.style.color = '#4df0c0';
                const landmarks = results.multiHandLandmarks[0];
                const getDist = (i, j) => Math.sqrt(Math.pow(landmarks[i].x - landmarks[j].x, 2) + Math.pow(landmarks[i].y - landmarks[j].y, 2));
                const isIndexOpen = getDist(8,0) > getDist(6,0)*1.05;
                const isMiddleOpen = getDist(12,0) > getDist(10,0)*1.05;
                const isRingOpen = getDist(16,0) > getDist(14,0)*1.05;
                const isPinkyOpen = getDist(20,0) > getDist(18,0)*1.05;
                let detectedMode = 'scale';
                if (isRingOpen || isPinkyOpen) detectedMode = 'scale';
                else if (isIndexOpen && isMiddleOpen) detectedMode = 'roll';
                else if (isIndexOpen && !isMiddleOpen) detectedMode = 'rotate';
                else detectedMode = 'scale';

                if (detectedMode === currentStableMode) modeFrameCounter = 0;
                else {
                    modeFrameCounter++;
                    if (modeFrameCounter > 2) {
                        currentStableMode = detectedMode; modeFrameCounter = 0;
                        isTrackingRotation = false; isTrackingRoll = false;
                        previousFingerPos = { x:0, y:0 };
                    }
                }

                if (currentStableMode === 'roll') {
                    const rawIndex = landmarks[8], rawMiddle = landmarks[12];
                    if (!isTrackingRoll) {
                        smoothedIndexTip = { x: rawIndex.x, y: rawIndex.y };
                        smoothedMiddleTip = { x: rawMiddle.x, y: rawMiddle.y };
                        const dx = rawIndex.x - rawMiddle.x, dy = rawIndex.y - rawMiddle.y;
                        previousRollAngle = Math.atan2(dy, dx);
                        isTrackingRoll = true;
                    } else {
                        const f = 0.25;
                        smoothedIndexTip.x = THREE.MathUtils.lerp(smoothedIndexTip.x, rawIndex.x, f);
                        smoothedIndexTip.y = THREE.MathUtils.lerp(smoothedIndexTip.y, rawIndex.y, f);
                        smoothedMiddleTip.x = THREE.MathUtils.lerp(smoothedMiddleTip.x, rawMiddle.x, f);
                        smoothedMiddleTip.y = THREE.MathUtils.lerp(smoothedMiddleTip.y, rawMiddle.y, f);
                    }
                    const dx = smoothedIndexTip.x - smoothedMiddleTip.x;
                    const dy = smoothedIndexTip.y - smoothedMiddleTip.y;
                    const currentAngle = Math.atan2(dy, dx);
                    let deltaAngle = currentAngle - previousRollAngle;
                    if (deltaAngle > Math.PI) deltaAngle -= 2*Math.PI;
                    if (deltaAngle < -Math.PI) deltaAngle += 2*Math.PI;
                    rotationVelocity.z = THREE.MathUtils.lerp(rotationVelocity.z, -deltaAngle*1.8, 0.35);
                    previousRollAngle = currentAngle;
                    isTrackingRotation = false;
                } else if (currentStableMode === 'rotate') {
                    const rawX = landmarks[8].x, rawY = landmarks[8].y;
                    if (!isTrackingRotation) {
                        smoothedFingerPos = { x: rawX, y: rawY };
                        previousFingerPos = { x: rawX, y: rawY };
                        isTrackingRotation = true;
                    }
                    const f = 0.28;
                    smoothedFingerPos.x = THREE.MathUtils.lerp(smoothedFingerPos.x, rawX, f);
                    smoothedFingerPos.y = THREE.MathUtils.lerp(smoothedFingerPos.y, rawY, f);
                    const deltaX = smoothedFingerPos.x - previousFingerPos.x;
                    const deltaY = smoothedFingerPos.y - previousFingerPos.y;
                    if (Math.abs(deltaX) > 0.003 || Math.abs(deltaY) > 0.003) {
                        const sens = 4.0;
                        if (Math.abs(deltaX) > Math.abs(deltaY)) {
                            const eff = deltaX > 0 ? deltaX - 0.003 : deltaX + 0.003;
                            rotationVelocity.y -= eff * sens;
                        } else {
                            const eff = deltaY > 0 ? deltaY - 0.003 : deltaY + 0.003;
                            rotationVelocity.x += eff * sens;
                        }
                    }
                    previousFingerPos = { x: smoothedFingerPos.x, y: smoothedFingerPos.y };
                    isTrackingRoll = false;
                } else {
                    if (isTrackingRoll) isTrackingRoll = false;
                    isTrackingRotation = false;
                    const tips = [4,8,12,16,20];
                    let totalDist = 0;
                    tips.forEach(idx => totalDist += getDist(idx,0));
                    const avgDist = totalDist/5;
                    let rawOpenness = (avgDist - 0.07) / (0.38 - 0.07);
                    rawOpenness = Math.max(0, Math.min(1, rawOpenness));
                    handInfluence = THREE.MathUtils.lerp(handInfluence, rawOpenness, 0.25);
                }
            } else {
                if (now - lastTimeHandDetected < 600) return;
                isHandDetected = false; isTrackingRotation = false; isTrackingRoll = false;
                modeFrameCounter = 0; currentStableMode = 'scale';
                statusDot.classList.remove('on');
                statusText.innerText = "等待手势"; statusText.style.color = '#aaa';
                handInfluence = THREE.MathUtils.lerp(handInfluence, 0.5, 0.03);
            }
        });
        const cameraUtils = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 640, height: 480,
        });
        try {
            await cameraUtils.start();
        } catch (err) {
            statusText.innerText = "摄像头不可用"; statusText.style.color = '#ff8888';
            isHandDetected = false;
        }
    }

    function onWindowResize() {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    }

    window.changeShape = (shape) => {
        tryStartAudio();
        currentShape = shape;
        targetPositions = getShapePositions(shape);
        targetColors = getShapeColors(shape);
        if (shape === 'saturn') particles.material.color.set(0xffffff);
        else particles.material.color.copy(userBaseColor);
        document.querySelectorAll('[data-shape]').forEach(btn => {
            btn.classList.remove('active');
            if (btn.dataset.shape === shape) btn.classList.add('active');
        });
    };

    document.querySelectorAll('[data-shape]').forEach(btn => {
        btn.addEventListener('click', () => { tryStartAudio(); changeShape(btn.dataset.shape); });
        btn.addEventListener('touchend', (e) => { e.preventDefault(); tryStartAudio(); changeShape(btn.dataset.shape); });
    });

    init().catch(err => {
        console.error('初始化失败:', err);
        document.getElementById('loader-overlay').innerHTML =
            '<div style="color:#ff8888;text-align:center;padding:20px;">⚠️ 初始化失败<br><small>请检查网络连接后刷新</small></div>';
    });
</script>
</body>
</html>
